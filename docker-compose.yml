# Production stack for the mikr.us VPS.
# Pulls pre-built images from GHCR (built by .github/workflows/deploy.yml).
# Watchtower polls GHCR every 60s and auto-restarts containers on a new image.
#
# The host nginx (already installed on the VPS, listening publicly on :20153)
# reverse-proxies to these containers on localhost — see deploy/nginx-rugplay.conf.
# (mikr.us intercepts :80 and :443 isn't usable, so we serve HTTP on :20153.)
#
# Run from the repo root with website/.env present:
#   docker compose up -d

services:
  app:
    image: ghcr.io/blitzprogramer/rugplay-app:latest
    restart: unless-stopped
    env_file:
      - website/.env
    environment:
      # adapter-node canonical origin. better-auth's isAuthPath compares
      # event.url.origin against PUBLIC_BETTER_AUTH_URL — behind nginx on a
      # non-standard port this must be set explicitly or /api/auth/* 404s.
      # Hardcoded to this VPS's public URL (single-site deploy).
      - ORIGIN=http://bob153.mikrus.xyz:20153
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - websocket
    labels:
      - com.centurylinklabs.watchtower.enable=true

  websocket:
    image: ghcr.io/blitzprogramer/rugplay-websocket:latest
    restart: unless-stopped
    env_file:
      - website/.env
    ports:
      - "127.0.0.1:8080:8080"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Auto-updater: checks GHCR for new image tags and restarts labeled containers.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      # Docker 29 daemon (API 1.54, min 1.40) rejects watchtower 1.7.1's default
      # negotiated client API (1.25, "too old"). Pin a version the daemon accepts.
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # --label-enable: only update containers with watchtower.enable=true.
    # (Name-matching with the filter `app websocket` scanned 0 containers because
    # compose names them rugplay-app-1 / rugplay-websocket-1.)
    command: --interval 60 --cleanup --label-enable
