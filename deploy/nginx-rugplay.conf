# Reverse proxy for Rugplay on mikr.us — HTTPS on the public port 20153.
# mikr.us intercepts :80 and :443 is unusable, so we serve TLS on :20153 with a
# Let's Encrypt cert for coinplay.duckdns.org (issued via DuckDNS DNS-01 by acme.sh;
# cert at /etc/ssl/rugplay/, auto-renewed). Installs into nginx http context, so the
# top-level `map` is valid here.

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 20153 ssl http2;
	listen [::]:20153 ssl http2;
	server_name coinplay.duckdns.org;

	ssl_certificate     /etc/ssl/rugplay/fullchain.pem;
	ssl_certificate_key /etc/ssl/rugplay/key.pem;
	ssl_protocols       TLSv1.2 TLSv1.3;
	ssl_session_cache   shared:SSL:5m;
	ssl_session_timeout 1h;

	client_max_body_size 25m;

	# WebSocket (wss) -> Bun websocket service (client: wss://coinplay.duckdns.org:20153/ws)
	location /ws {
		proxy_pass http://127.0.0.1:8080;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_read_timeout 86400s;
		proxy_send_timeout 86400s;
	}

	# Everything else -> SvelteKit app
	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Host $http_host;
		proxy_set_header X-Forwarded-Proto https;
		proxy_read_timeout 60s;
	}
}
