# Reverse proxy for Rugplay on mikr.us.
# Public port is 20153 (mikr.us intercepts :80 and :443 isn't usable for TLS).
# Installs into nginx http context, so the top-level `map` is valid here.

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 20153 default_server;
	listen [::]:20153 default_server;
	server_name bob153.mikrus.xyz;

	client_max_body_size 25m;

	# WebSocket -> Bun websocket service (client connects to ws://<host>:20153/ws)
	location /ws {
		proxy_pass http://127.0.0.1:8080;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_read_timeout 86400s;
		proxy_send_timeout 86400s;
	}

	# Everything else -> SvelteKit app
	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 60s;
	}
}
