name: build-and-deploy

# Builds the two production images (SvelteKit/Node app + Bun websocket) for
# linux/amd64 and pushes them to GHCR. The VPS watches GHCR via Watchtower and
# auto-pulls + restarts when a new image appears — no manual server action needed.
#
# NOTE: the app build needs NO secrets. All env is read at runtime via
# $env/dynamic/* (see src/lib/server/{redis,gemini,s3}.ts etc.), so secrets never
# end up baked into the public image.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app (SvelteKit / Node)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production-main
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rugplay-app:latest
            ghcr.io/${{ github.repository_owner }}/rugplay-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push websocket (Bun)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production-websocket
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rugplay-websocket:latest
            ghcr.io/${{ github.repository_owner }}/rugplay-websocket:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
